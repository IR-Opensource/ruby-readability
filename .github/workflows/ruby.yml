name: Ruby build xxx IR
on:
  workflow_dispatch:

jobs:
  RUBY:
    runs-on: ubuntu-latest
    name: Run build
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          app_token: ${{secrets.IR_API_KEY}}
      # ============= InvisiRisk Setup End =============
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.1' # specify your Ruby version
          
      - name: Install dependencies
        run: |
          gem install bundler
          bundle install  # If you have a Gemfile
          gem list # This will list all installed gems
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============